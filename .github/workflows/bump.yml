name: Bump Formula

on:
  # Called by gitlawb/gitlawb release workflow via repository_dispatch
  repository_dispatch:
    types: [release]

  # Manual trigger for testing or one-off bumps
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.3)"
        required: true

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' for use in formula's `version` field
          echo "bare=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Download sha256 sidecars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p /tmp/shasums
          for target in \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            aarch64-unknown-linux-musl \
            x86_64-unknown-linux-musl; do
            curl -fsSL \
              "https://github.com/gitlawb/releases/releases/download/${VERSION}/gitlawb-${VERSION}-${target}.tar.gz.sha256" \
              -o "/tmp/shasums/${target}.sha256"
          done

      - name: Update Formula/gl.rb
        env:
          VERSION: ${{ steps.ver.outputs.bare }}
        run: |
          SHA_AARCH64_DARWIN=$(awk '{print $1}' /tmp/shasums/aarch64-apple-darwin.sha256)
          SHA_X86_64_DARWIN=$(awk  '{print $1}' /tmp/shasums/x86_64-apple-darwin.sha256)
          SHA_AARCH64_LINUX=$(awk  '{print $1}' /tmp/shasums/aarch64-unknown-linux-musl.sha256)
          SHA_X86_64_LINUX=$(awk   '{print $1}' /tmp/shasums/x86_64-unknown-linux-musl.sha256)

          FORMULA=Formula/gl.rb

          # Bump version
          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$FORMULA"

          # Bump sha256 values — order in file: aarch64-darwin, x86_64-darwin, aarch64-linux, x86_64-linux
          python3 - "$FORMULA" \
            "$SHA_AARCH64_DARWIN" "$SHA_X86_64_DARWIN" \
            "$SHA_AARCH64_LINUX"  "$SHA_X86_64_LINUX"  \
          <<'EOF'
          import sys, re

          formula_path = sys.argv[1]
          shas = sys.argv[2:]  # order: aarch64-darwin, x86_64-darwin, aarch64-linux, x86_64-linux

          text = open(formula_path).read()
          count = [0]

          def replacer(m):
              sha = shas[count[0]]
              count[0] += 1
              return f'      sha256 "{sha}"'

          text = re.sub(r'      sha256 "[0-9a-f]{64}"', replacer, text)
          open(formula_path, 'w').write(text)
          print("Updated sha256 values.")
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gl.rb
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "bump gl to v${{ steps.ver.outputs.bare }}"
          git push
